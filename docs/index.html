<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TG Proxy — рабочие прокси для Telegram</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f13;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 32px 16px;
    }

    .container { max-width: 600px; margin: 0 auto; }

    header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 32px;
    }

    .tg-icon {
      width: 52px; height: 52px;
      background: #2AABEE;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .tg-icon svg { width: 30px; height: 30px; }

    .header-text h1 { font-size: 1.6rem; font-weight: 700; color: #fff; line-height: 1.2; }
    .header-text p { color: #666; font-size: 0.88rem; margin-top: 3px; }

    .meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding: 0 2px;
      min-height: 28px;
      gap: 8px;
    }

    .meta .count { font-size: 0.88rem; color: #888; white-space: nowrap; }
    .meta .right { display: flex; align-items: center; gap: 6px; }

    .sort-btn {
      background: none;
      border: 1px solid #2a2a35;
      color: #666;
      padding: 5px 11px;
      border-radius: 7px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .sort-btn:hover { border-color: #444; color: #aaa; }
    .sort-btn.active { border-color: #2b5ce6; color: #7da4f8; background: #1a2040; }

    .refresh-btn {
      background: none;
      border: 1px solid #2a2a35;
      color: #888;
      padding: 5px 12px;
      border-radius: 7px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .refresh-btn:hover { border-color: #555; color: #ccc; }
    .refresh-btn:disabled { opacity: 0.4; cursor: default; }

    .proxy-list { display: flex; flex-direction: column; gap: 10px; }

    .proxy-card {
      background: #1a1a22;
      border: 1px solid #2a2a35;
      border-radius: 12px;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .proxy-info { flex: 1; min-width: 0; }

    .proxy-server {
      font-size: 0.95rem;
      font-weight: 600;
      color: #c9d1ff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .proxy-port { font-size: 0.8rem; color: #555; margin-top: 2px; }
    .proxy-stars { font-size: 0.78rem; color: #a07830; margin-top: 3px; }

    .btn-connect {
      display: inline-block;
      background: #2b5ce6;
      color: #fff;
      text-decoration: none;
      padding: 8px 18px;
      border-radius: 8px;
      font-size: 0.88rem;
      font-weight: 600;
      white-space: nowrap;
      transition: background 0.15s;
      flex-shrink: 0;
    }
    .btn-connect:hover { background: #3a6cf5; }

    .status {
      text-align: center;
      color: #555;
      padding: 60px 0;
      font-size: 0.95rem;
      line-height: 1.6;
    }
    .status.error { color: #c0392b; }

    .spinner {
      width: 28px; height: 28px;
      border: 3px solid #2a2a35;
      border-top-color: #2b5ce6;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="tg-icon">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M2.5 12C2.5 6.75 6.75 2.5 12 2.5C17.25 2.5 21.5 6.75 21.5 12C21.5 17.25 17.25 21.5 12 21.5C6.75 21.5 2.5 17.25 2.5 12Z" fill="#2AABEE"/>
          <path d="M17.207 7.16L14.752 18.011C14.752 18.011 14.416 18.854 13.492 18.46L8.627 14.733L6.832 13.876L3.887 12.947C3.887 12.947 3.445 12.79 3.402 12.396C3.358 12.002 3.902 11.817 3.902 11.817L16.15 6.828C16.15 6.828 17.207 6.367 17.207 7.16Z" fill="white"/>
          <path d="M9.23 17.899L8.503 14.695L14.415 10.638C14.415 10.638 14.76 10.424 14.746 10.638C14.746 10.638 14.803 10.675 14.617 10.848C14.431 11.021 8.643 16.225 8.643 16.225" fill="#D2E5F1"/>
          <path d="M11.12 16.408L8.578 18.025C8.578 18.025 8.376 18.043 8.19 17.899L8.629 14.693" fill="#B5CFE4"/>
        </svg>
      </div>
      <div class="header-text">
        <h1>Proxy</h1>
        <p>Свежие прокси для Telegram</p>
      </div>
    </header>

    <div class="meta">
      <span class="count" id="count"></span>
      <div class="right">
        <button class="sort-btn active" id="sortFresh" onclick="setSort('fresh')">Свежие</button>
        <button class="sort-btn" id="sortStars" onclick="setSort('stars')">По звёздам</button>
        <button class="refresh-btn" id="refreshBtn" onclick="load()">↻ Обновить</button>
      </div>
    </div>

    <div id="list" class="proxy-list">
      <div class="status"><div class="spinner"></div>Загружаем прокси...</div>
    </div>
  </div>

  <script>
    let allProxies = [];
    let sortMode = 'fresh';

    function setSort(mode) {
      sortMode = mode;
      document.getElementById('sortFresh').classList.toggle('active', mode === 'fresh');
      document.getElementById('sortStars').classList.toggle('active', mode === 'stars');
      if (allProxies.length > 0) render();
    }

    function getSorted() {
      if (sortMode === 'stars') {
        return [...allProxies].sort((a, b) => (b.stars || 0) - (a.stars || 0));
      }
      return allProxies;
    }

    function render() {
      const listEl = document.getElementById('list');
      listEl.innerHTML = getSorted().map(p => {
        const link = `tg://proxy?server=${encodeURIComponent(p.server)}&port=${encodeURIComponent(p.port)}&secret=${encodeURIComponent(p.secret)}`;
        return `
          <div class="proxy-card">
            <div class="proxy-info">
              <div class="proxy-server">${p.server}</div>
              <div class="proxy-port">Порт: ${p.port}</div>
              ${p.stars > 0 ? `<div class="proxy-stars">⭐ ${p.stars}</div>` : ''}
            </div>
            <a class="btn-connect" href="${link}">Подключить</a>
          </div>
        `;
      }).join('');
    }

    async function load() {
      const listEl = document.getElementById('list');
      const countEl = document.getElementById('count');
      const btn = document.getElementById('refreshBtn');

      listEl.innerHTML = '<div class="status"><div class="spinner"></div>Загружаем прокси...</div>';
      countEl.textContent = '';
      btn.disabled = true;
      allProxies = [];

      try {
        const res = await fetch('/api/proxies');
        const data = await res.json();
        allProxies = data.proxies || [];
        btn.disabled = false;

        if (allProxies.length === 0) {
          listEl.innerHTML = '<div class="status error">Прокси не найдены.<br><small>Попробуй обновить страницу.</small></div>';
          return;
        }

        countEl.textContent = `${allProxies.length} прокси найдено`;
        render();
      } catch {
        btn.disabled = false;
        listEl.innerHTML = '<div class="status error">Не удалось загрузить прокси.<br><small>Попробуй обновить страницу.</small></div>';
      }
    }

    load();
  </script>
</body>
</html>
