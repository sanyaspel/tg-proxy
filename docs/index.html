<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TG Proxy — рабочие прокси для Telegram</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f13;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 32px 16px;
    }

    .container { max-width: 600px; margin: 0 auto; }

    header {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 32px;
      gap: 8px;
    }

    .header-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .tg-icon {
      width: 36px;
      height: 36px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 1.9rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.5px;
    }

    header p { color: #555; font-size: 0.88rem; }

    .meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding: 0 2px;
      gap: 8px;
    }

    .meta .count { font-size: 0.88rem; color: #555; white-space: nowrap; }

    .meta .right { display: flex; align-items: center; gap: 8px; }

    .sort-btn {
      background: none;
      border: 1px solid #2a2a35;
      color: #777;
      padding: 5px 12px;
      border-radius: 7px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .sort-btn.active {
      border-color: #2b5ce6;
      color: #7aa0ff;
      background: rgba(43,92,230,0.1);
    }
    .sort-btn:hover:not(.active) { border-color: #555; color: #ccc; }

    .refresh-btn {
      background: none;
      border: 1px solid #2a2a35;
      color: #777;
      padding: 5px 12px;
      border-radius: 7px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .refresh-btn:hover { border-color: #555; color: #ccc; }
    .refresh-btn:disabled { opacity: 0.4; cursor: default; }

    .proxy-list { display: flex; flex-direction: column; gap: 10px; }

    .proxy-card {
      background: #1a1a22;
      border: 1px solid #2a2a35;
      border-radius: 12px;
      padding: 14px 18px;
      transition: border-color 0.2s, opacity 0.2s;
    }
    .proxy-card.viewed { opacity: 0.45; }

    .proxy-top {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      overflow: hidden;
    }

    .proxy-server {
      flex: 1;
      font-size: 0.95rem;
      font-weight: 600;
      color: #c9d1ff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .proxy-port-inline { color: #555; font-weight: 400; }

    .proxy-num {
      font-size: 0.72rem;
      color: #4a4a5a;
      white-space: nowrap;
      flex-shrink: 0;
      align-self: center;
    }

    .proxy-bottom { display: flex; gap: 8px; align-items: center; margin-top: 6px; flex-wrap: wrap; }

    .proxy-stars { font-size: 0.78rem; color: #7a5820; }
    .proxy-age { font-size: 0.78rem; color: #4a4a5a; }

    .ping-badge {
      font-size: 0.76rem;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 5px;
    }
    .ping-badge.checking { color: #444; }
    .ping-badge.ok { color: #4caf50; background: rgba(76,175,80,0.1); }
    .ping-badge.ok.slow { color: #ff9800; background: rgba(255,152,0,0.1); }
    .ping-badge.fail { color: #555; }

    .btn-connect {
      display: inline-block;
      background: #2b5ce6;
      color: #fff;
      text-decoration: none;
      padding: 8px 18px;
      border-radius: 8px;
      font-size: 0.88rem;
      font-weight: 600;
      white-space: nowrap;
      transition: background 0.15s;
      flex-shrink: 0;
    }
    .btn-connect:hover { background: #3a6cf5; }

    .status {
      text-align: center;
      color: #555;
      padding: 60px 0;
      font-size: 0.95rem;
      line-height: 1.6;
    }
    .status.error { color: #c0392b; }

    .spinner {
      width: 28px; height: 28px;
      border: 3px solid #2a2a35;
      border-top-color: #2b5ce6;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="header-row">
        <svg class="tg-icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="24" cy="24" r="24" fill="#2AABEE"/>
          <path d="M10.5 23.5l5.8 2.2 2.2 7 2.8-3.8 6 4.5 5.7-19.4-22.5 9.5z" fill="white"/>
          <path d="M18.5 25.7l.6 5.5 2.8-3.8" fill="#d5e8f3"/>
        </svg>
        <h1>Proxy</h1>
      </div>
      <p>Свежие прокси для Telegram</p>
    </header>

    <div class="meta">
      <span class="count" id="count"></span>
      <div class="right">
        <button class="refresh-btn" id="refreshBtn" onclick="load()">↻ Обновить</button>
      </div>
    </div>

    <div id="list" class="proxy-list">
      <div class="status"><div class="spinner"></div>Загружаем свежие прокси...</div>
    </div>
  </div>

  <script>
    const CHECK_WORKER = "https://old-lab-41dc.alexchert33.workers.dev/";

    function timeAgo(iso) {
      if (!iso) return "";
      const diff = Math.floor((Date.now() - new Date(iso)) / 1000);
      if (diff < 3600) return `${Math.floor(diff / 60)} мин назад`;
      if (diff < 86400) return `${Math.floor(diff / 3600)} ч назад`;
      return `${Math.floor(diff / 86400)} д назад`;
    }

    let proxies = [];

    function pingColor(ping) {
      if (ping === null) return "fail";
      if (ping < 150) return "ok";
      return "ok slow";
    }

    function pingText(p) {
      if (p.pingStatus === "checking") return '<span class="ping-badge checking">...</span>';
      if (p.pingStatus === "fail") return '<span class="ping-badge fail">✗</span>';
      if (p.ping !== null) return `<span class="ping-badge ${pingColor(p.ping)}">${p.ping} мс</span>`;
      return "";
    }

    function render() {
      const listEl = document.getElementById("list");
      if (!proxies.length) return;

      const sorted = [...proxies];

      listEl.innerHTML = sorted.map((p, i) => {
        const link = `tg://proxy?server=${encodeURIComponent(p.server)}&port=${encodeURIComponent(p.port)}&secret=${encodeURIComponent(p.secret)}`;
        const key = `${p.server}:${p.port}`;
        const viewed = sessionStorage.getItem("v:" + key) ? " viewed" : "";
        return `
          <div class="proxy-card${viewed}" id="card-${p.server}-${p.port}">
            <div class="proxy-top">
              <span class="proxy-server">${p.server}<span class="proxy-port-inline">:${p.port}</span></span>
              <a class="btn-connect" href="${link}" onclick="markViewed('${key}')">Подключить</a>
              <span class="proxy-num">#${i + 1}</span>
            </div>
            <div class="proxy-bottom" id="bottom-${p.server}-${p.port}">
              ${p.publishedAt ? `<span class="proxy-age">${timeAgo(p.publishedAt)}</span>` : ""}
              ${p.stars > 0 ? `<span class="proxy-stars">⭐ ${p.stars}</span>` : ""}
              ${pingText(p)}
            </div>
          </div>
        `;
      }).join("");
    }

    function markViewed(key) {
      sessionStorage.setItem("v:" + key, "1");
      const parts = key.split(":");
      const card = document.getElementById(`card-${parts.slice(0, -1).join(":")}:${parts[parts.length-1]}`.replace(/^card-/, ""));
      // найдём карточку по data или просто добавим класс
      document.querySelectorAll(".proxy-card").forEach(c => {
        const btn = c.querySelector(".btn-connect");
        if (btn && btn.getAttribute("onclick") === `markViewed('${key}')`) {
          c.classList.add("viewed");
        }
      });
    }

    function updateCard(proxy) {
      const bottom = document.getElementById(`bottom-${proxy.server}-${proxy.port}`);
      if (!bottom) return;
      const existing = bottom.querySelector(".ping-badge");
      if (existing) existing.remove();
      bottom.insertAdjacentHTML("beforeend", pingText(proxy));
    }

    async function checkProxy(proxy) {
      proxy.pingStatus = "checking";
      try {
        const res = await fetch(`${CHECK_WORKER}?server=${encodeURIComponent(proxy.server)}&port=${encodeURIComponent(proxy.port)}`, {
          signal: AbortSignal.timeout(6000),
        });
        const data = await res.json();
        proxy.pingStatus = data.ok ? "ok" : "fail";
        proxy.ping = data.ok ? data.ping : null;
      } catch {
        proxy.pingStatus = "fail";
        proxy.ping = null;
      }
      updateCard(proxy);
    }

    async function load() {
      const listEl = document.getElementById("list");
      const countEl = document.getElementById("count");
      const btn = document.getElementById("refreshBtn");

      listEl.innerHTML = '<div class="status"><div class="spinner"></div>Загружаем свежие прокси...</div>';
      countEl.textContent = "";
      btn.disabled = true;
      proxies = [];

      try {
        const res = await fetch("/api/proxies");
        const data = await res.json();
        proxies = (data.proxies || []).map(p => ({ ...p, ping: null, pingStatus: "checking" }));

        btn.disabled = false;

        if (!proxies.length) {
          listEl.innerHTML = '<div class="status error">Прокси не найдены.<br><small>Попробуй обновить страницу.</small></div>';
          return;
        }

        countEl.textContent = `${proxies.length} прокси`;
        render();

        // Проверяем пинг параллельно через Cloudflare Worker (из России)
        proxies.forEach(p => checkProxy(p));

      } catch {
        btn.disabled = false;
        listEl.innerHTML = '<div class="status error">Не удалось загрузить прокси.<br><small>Попробуй обновить страницу.</small></div>';
      }
    }

    load();
  </script>
</body>
</html>
