<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TG Proxy — рабочие прокси для Telegram</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f13;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 32px 16px;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 32px;
    }

    header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 6px;
    }

    header p {
      color: #888;
      font-size: 0.92rem;
    }

    .meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding: 0 2px;
    }

    .meta .count {
      font-size: 0.88rem;
      color: #888;
    }

    .meta .updated {
      font-size: 0.82rem;
      color: #555;
    }

    .proxy-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .proxy-card {
      background: #1a1a22;
      border: 1px solid #2a2a35;
      border-radius: 12px;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .proxy-info {
      flex: 1;
      min-width: 0;
    }

    .proxy-server {
      font-size: 0.95rem;
      font-weight: 600;
      color: #c9d1ff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .proxy-port {
      font-size: 0.8rem;
      color: #555;
      margin-top: 2px;
    }

    .btn-connect {
      display: inline-block;
      background: #2b5ce6;
      color: #fff;
      text-decoration: none;
      padding: 8px 18px;
      border-radius: 8px;
      font-size: 0.88rem;
      font-weight: 600;
      white-space: nowrap;
      transition: background 0.15s;
      flex-shrink: 0;
    }

    .btn-connect:hover {
      background: #3a6cf5;
    }

    .empty {
      text-align: center;
      color: #555;
      padding: 60px 0;
      font-size: 0.95rem;
    }

    .loading {
      text-align: center;
      color: #555;
      padding: 60px 0;
    }

    .dot-anim::after {
      content: "";
      animation: dots 1.2s steps(3, end) infinite;
    }

    @keyframes dots {
      0%   { content: ""; }
      33%  { content: "."; }
      66%  { content: ".."; }
      100% { content: "..."; }
    }

    .refresh-btn {
      background: none;
      border: 1px solid #2a2a35;
      color: #888;
      padding: 6px 14px;
      border-radius: 7px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    .refresh-btn:hover {
      border-color: #555;
      color: #ccc;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🔒 TG Proxy</h1>
      <p>Рабочие MTProto прокси для Telegram. Обновляется каждые 30 минут.</p>
    </header>

    <div class="meta">
      <span class="count" id="count"></span>
      <span class="updated" id="updated"></span>
    </div>

    <div id="list" class="proxy-list">
      <div class="loading"><span class="dot-anim">Загрузка</span></div>
    </div>
  </div>

  <script>
    async function load() {
      const listEl = document.getElementById("list");
      const countEl = document.getElementById("count");
      const updatedEl = document.getElementById("updated");

      try {
        const res = await fetch("proxies.json?t=" + Date.now());
        const data = await res.json();

        const proxies = data.proxies || [];
        countEl.textContent = `${proxies.length} рабочих прокси`;

        if (data.updated) {
          const d = new Date(data.updated);
          updatedEl.innerHTML = `Обновлено: ${d.toLocaleTimeString("ru-RU", { hour: "2-digit", minute: "2-digit" })} &nbsp;<button class="refresh-btn" onclick="load()">↻</button>`;
        }

        if (proxies.length === 0) {
          listEl.innerHTML = '<div class="empty">Рабочих прокси не найдено.<br>Попробуйте обновить страницу позже.</div>';
          return;
        }

        listEl.innerHTML = proxies.map((p, i) => {
          const link = `tg://proxy?server=${encodeURIComponent(p.server)}&port=${encodeURIComponent(p.port)}&secret=${encodeURIComponent(p.secret)}`;
          return `
            <div class="proxy-card">
              <div class="proxy-info">
                <div class="proxy-server">${p.server}</div>
                <div class="proxy-port">Порт: ${p.port}</div>
              </div>
              <a class="btn-connect" href="${link}">Подключить</a>
            </div>
          `;
        }).join("");

      } catch (e) {
        listEl.innerHTML = '<div class="empty">Ошибка загрузки. Попробуйте обновить страницу.</div>';
      }
    }

    load();
  </script>
</body>
</html>
