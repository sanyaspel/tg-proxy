<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TG Proxy — рабочие прокси для Telegram</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f13;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 32px 16px;
    }

    .container { max-width: 600px; margin: 0 auto; }

    header { text-align: center; margin-bottom: 32px; }
    header h1 { font-size: 1.8rem; font-weight: 700; color: #fff; margin-bottom: 6px; }
    header p { color: #888; font-size: 0.92rem; }

    .meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding: 0 2px;
      min-height: 28px;
    }

    .meta .count { font-size: 0.88rem; color: #888; }
    .meta .right { display: flex; align-items: center; gap: 8px; }

    .refresh-btn {
      background: none;
      border: 1px solid #2a2a35;
      color: #888;
      padding: 5px 12px;
      border-radius: 7px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .refresh-btn:hover { border-color: #555; color: #ccc; }
    .refresh-btn:disabled { opacity: 0.4; cursor: default; }

    .proxy-list { display: flex; flex-direction: column; gap: 10px; }

    .proxy-card {
      background: #1a1a22;
      border: 1px solid #2a2a35;
      border-radius: 12px;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .proxy-info { flex: 1; min-width: 0; }

    .proxy-server {
      font-size: 0.95rem;
      font-weight: 600;
      color: #c9d1ff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .proxy-port { font-size: 0.8rem; color: #555; margin-top: 2px; }

    .proxy-stars { font-size: 0.78rem; color: #a07830; margin-top: 3px; }

    .btn-connect {
      display: inline-block;
      background: #2b5ce6;
      color: #fff;
      text-decoration: none;
      padding: 8px 18px;
      border-radius: 8px;
      font-size: 0.88rem;
      font-weight: 600;
      white-space: nowrap;
      transition: background 0.15s;
      flex-shrink: 0;
    }
    .btn-connect:hover { background: #3a6cf5; }

    .status {
      text-align: center;
      color: #555;
      padding: 60px 0;
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .status.error { color: #c0392b; }

    .spinner {
      width: 28px; height: 28px;
      border: 3px solid #2a2a35;
      border-top-color: #2b5ce6;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🔒 TG Proxy</h1>
      <p>Свежие MTProto прокси для Telegram. Нажми — Telegram сам добавит.</p>
    </header>

    <div class="meta">
      <span class="count" id="count"></span>
      <div class="right">
        <button class="refresh-btn" id="refreshBtn" onclick="load()">↻ Обновить</button>
      </div>
    </div>

    <div id="list" class="proxy-list">
      <div class="status"><div class="spinner"></div>Загружаем свежие прокси...</div>
    </div>
  </div>

  <script>
    async function load() {
      const listEl = document.getElementById("list");
      const countEl = document.getElementById("count");
      const btn = document.getElementById("refreshBtn");

      listEl.innerHTML = '<div class="status"><div class="spinner"></div>Загружаем свежие прокси...</div>';
      countEl.textContent = "";
      btn.disabled = true;

      try {
        const res = await fetch("/api/proxies");
        const data = await res.json();
        const proxies = data.proxies || [];

        btn.disabled = false;

        if (proxies.length === 0) {
          listEl.innerHTML = '<div class="status error">Прокси не найдены.<br><small>Попробуй обновить страницу.</small></div>';
          return;
        }

        countEl.textContent = `${proxies.length} прокси найдено`;
        listEl.innerHTML = proxies.map(p => {
          const link = `tg://proxy?server=${encodeURIComponent(p.server)}&port=${encodeURIComponent(p.port)}&secret=${encodeURIComponent(p.secret)}`;
          return `
            <div class="proxy-card">
              <div class="proxy-info">
                <div class="proxy-server">${p.server}</div>
                <div class="proxy-port">Порт: ${p.port}</div>
                ${p.stars > 0 ? `<div class="proxy-stars">⭐ ${p.stars}</div>` : ""}
              </div>
              <a class="btn-connect" href="${link}">Подключить</a>
            </div>
          `;
        }).join("");

      } catch {
        btn.disabled = false;
        listEl.innerHTML = '<div class="status error">Не удалось загрузить прокси.<br><small>Попробуй обновить страницу.</small></div>';
      }
    }

    load();
  </script>
</body>
</html>
