<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TG Proxy — рабочие прокси для Telegram</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f13;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 32px 16px;
    }

    .container { max-width: 600px; margin: 0 auto; }

    header { text-align: center; margin-bottom: 32px; }
    header h1 { font-size: 1.8rem; font-weight: 700; color: #fff; margin-bottom: 6px; }
    header p { color: #888; font-size: 0.92rem; }

    .meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding: 0 2px;
      min-height: 28px;
    }

    .meta .count { font-size: 0.88rem; color: #888; }
    .meta .right { display: flex; align-items: center; gap: 8px; }

    .refresh-btn {
      background: none;
      border: 1px solid #2a2a35;
      color: #888;
      padding: 5px 12px;
      border-radius: 7px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .refresh-btn:hover { border-color: #555; color: #ccc; }
    .refresh-btn:disabled { opacity: 0.4; cursor: default; }

    .proxy-list { display: flex; flex-direction: column; gap: 10px; }

    .proxy-card {
      background: #1a1a22;
      border: 1px solid #2a2a35;
      border-radius: 12px;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .proxy-info { flex: 1; min-width: 0; }

    .proxy-server {
      font-size: 0.95rem;
      font-weight: 600;
      color: #c9d1ff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .proxy-port { font-size: 0.8rem; color: #555; margin-top: 2px; }

    .btn-connect {
      display: inline-block;
      background: #2b5ce6;
      color: #fff;
      text-decoration: none;
      padding: 8px 18px;
      border-radius: 8px;
      font-size: 0.88rem;
      font-weight: 600;
      white-space: nowrap;
      transition: background 0.15s;
      flex-shrink: 0;
    }
    .btn-connect:hover { background: #3a6cf5; }

    .status {
      text-align: center;
      color: #555;
      padding: 60px 0;
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .status.error { color: #c0392b; }

    .spinner {
      width: 28px; height: 28px;
      border: 3px solid #2a2a35;
      border-top-color: #2b5ce6;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🔒 TG Proxy</h1>
      <p>Свежие MTProto прокси для Telegram. Нажми — Telegram сам добавит.</p>
    </header>

    <div class="meta">
      <span class="count" id="count"></span>
      <div class="right">
        <button class="refresh-btn" id="refreshBtn" onclick="load()">↻ Обновить</button>
      </div>
    </div>

    <div id="list" class="proxy-list">
      <div class="status"><div class="spinner"></div>Загружаем свежие прокси...</div>
    </div>
  </div>

  <script>
    const CHANNELS = ["ProxyMTProto", "mtpro_xyz", "FreeProxyMTProto"];

    // Несколько CORS-прокси, пробуем по очереди если один не работает
    const CORS_PROXIES = [
      url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
      url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
      url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
    ];

    function parseProxies(html) {
      const results = [];
      const seen = new Set();

      // Парсим tg://proxy?... ссылки
      const linkRe = /tg:\/\/proxy\?[^"'\s<>]+/g;
      let m;
      while ((m = linkRe.exec(html)) !== null) {
        try {
          const qs = new URLSearchParams(m[0].replace("tg://proxy?", ""));
          const server = qs.get("server");
          const port = qs.get("port");
          const secret = qs.get("secret");
          if (server && port && secret) {
            const key = `${server}:${port}`;
            if (!seen.has(key)) {
              seen.add(key);
              results.push({ server, port, secret });
            }
          }
        } catch {}
      }

      // Парсим текстовый формат: Server: ... Port: ... Secret: ...
      const textRe = /Server:\s*([^\s<\n]+)[\s\S]{0,100}?Port:\s*(\d+)[\s\S]{0,200}?Secret:\s*([a-zA-Z0-9+/=]{10,})/gi;
      while ((m = textRe.exec(html)) !== null) {
        const server = m[1].trim();
        const port = m[2].trim();
        const secret = m[3].trim();
        const key = `${server}:${port}`;
        if (!seen.has(key)) {
          seen.add(key);
          results.push({ server, port, secret });
        }
      }

      return results;
    }

    async function fetchWithProxy(url) {
      for (const makeProxy of CORS_PROXIES) {
        try {
          const res = await fetch(makeProxy(url), { signal: AbortSignal.timeout(8000) });
          if (res.ok) return await res.text();
        } catch {}
      }
      return null;
    }

    async function load() {
      const listEl = document.getElementById("list");
      const countEl = document.getElementById("count");
      const btn = document.getElementById("refreshBtn");

      listEl.innerHTML = '<div class="status"><div class="spinner"></div>Загружаем свежие прокси...</div>';
      countEl.textContent = "";
      btn.disabled = true;

      const allProxies = [];

      await Promise.all(CHANNELS.map(async (ch) => {
        const html = await fetchWithProxy(`https://t.me/s/${ch}`);
        if (html) allProxies.push(...parseProxies(html));
      }));

      // Дедупликация
      const seen = new Set();
      const unique = allProxies.filter(p => {
        const key = `${p.server}:${p.port}`;
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });

      btn.disabled = false;

      if (unique.length === 0) {
        countEl.textContent = "";
        listEl.innerHTML = '<div class="status error">Не удалось загрузить прокси.<br><small>Попробуй обновить страницу или зайди позже.</small></div>';
        return;
      }

      countEl.textContent = `${unique.length} прокси найдено`;
      listEl.innerHTML = unique.map(p => {
        const link = `tg://proxy?server=${encodeURIComponent(p.server)}&port=${encodeURIComponent(p.port)}&secret=${encodeURIComponent(p.secret)}`;
        return `
          <div class="proxy-card">
            <div class="proxy-info">
              <div class="proxy-server">${p.server}</div>
              <div class="proxy-port">Порт: ${p.port}</div>
            </div>
            <a class="btn-connect" href="${link}">Подключить</a>
          </div>
        `;
      }).join("");
    }

    load();
  </script>
</body>
</html>
